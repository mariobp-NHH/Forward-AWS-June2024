{% extends "gd_course/NHH_2026_group1/layout.html" %} {% block content %} 

<link
  rel="stylesheet"
  href="https://forward-static.s3.eu-north-1.amazonaws.com/gd_course/gd_course_NHH_2026_group1/home.css"
/>

<section class="section_header_home">
  <div class="page-container">
    <div class="header_home header_home--hero">
      <div class="hero-content">
        <!-- Hovedlogo/tittel -->
        <h1 class="hero-title">
          <span class="hero-title-dark">Eco</span
          ><span class="hero-title-light">Route</span>
        </h1>

        <!-- Kort tagline under tittelen -->
        <p class="hero-text">Transporting our way to a cleaner future</p>

        <!-- VÅR DYNAMISKE FORSIDE SOM AVHENGER AV OM BRUKER ER INNLOGGET ELLER IKKE -->
        <div class="hero-actions">
          {% if current_user.is_authenticated %}
          <!-- Når brukeren er logget inn, gir vi knapper som passer bedre til faktisk bruk av appen -->
          <a
            href="{{ url_for('gd_course_NHH_2026_group1.your_shipments') }}"
            class="btn-hero btn-hero--primary"
            >View and log shipments</a
          >
          <a
            href="{{ url_for('gd_course_NHH_2026_group1.your_routes') }}"
            class="btn-hero btn-hero--secondary"
            >View and administer routes</a
          >
          <a
            href="{{ url_for('gd_course_NHH_2026_group1.your_data_home') }}"
            class="btn-hero btn-hero--secondary"
            >Emission dashboard</a
          >

          {% else %}
          <!-- Når brukeren ikke er logget inn, viser vi register/login som før -->
          <a
            href="{{ url_for('gd_course_NHH_2026_group1.register') }}"
            class="btn-hero btn-hero--primary"
            >Register</a
          >
          <a
            href="{{ url_for('gd_course_NHH_2026_group1.login') }}"
            class="btn-hero btn-hero--secondary"
            >Login</a
          >
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</section>

{% endblock content %}
